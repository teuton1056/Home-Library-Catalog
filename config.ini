[database]
# Path to the SQLite database file, relative to the application directory.
path = library.db


[backup]
# Directory for all backups, relative to the application directory.
backup_dir = backups

# Number of short-term (per-write) backups to keep.
short_keep = 5

# Number of daily backups to keep.
daily_keep = 30


[server]
# Development server settings (only used when running app.py directly).
host  = 127.0.0.1
port  = 5005
debug = true


[logging]
# Log level for the rotating file handler.
# DEBUG is recommended — it captures fine-grained diagnostics without requiring a restart.
# Valid values: DEBUG, INFO, WARNING, ERROR, CRITICAL
file_level = DEBUG

# Log level for stdout.
# INFO keeps the console readable during normal operation.
# Valid values: DEBUG, INFO, WARNING, ERROR, CRITICAL
stdout_level = WARNING

# Path to the log file, relative to the application directory.
log_file = logs/app.log

# Maximum size of a single log file before rotation, in bytes.
# 5242880 = 5 MB
max_bytes = 5242880

# Number of rotated log files to keep alongside the active one.
backup_count = 3

# Set to false to disable file logging entirely.
file_enabled = true

# Set to false to disable stdout logging entirely.
stdout_enabled = true


[locale]
# the label file to use, default is agnostics to classification system
# locus is specific to the LOCUS system.
labels = locus

[classification]
classification_dir = classification
heading_order_file = LOCUS_Heading_Order.json