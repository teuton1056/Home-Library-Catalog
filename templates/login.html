{% extends 'base.html' %}
{% block title %}Log In — Home Library Catalog{% endblock %}

{% block content %}
<div class="login-card">
  <h1>Log In</h1>
  <form method="post" action="{{ url_for('login') }}" class="login-form">
    {% if next %}
    <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    <div class="form-group">
      <label for="patron_number">Patron Number</label>
      <input id="patron_number" name="patron_number" type="text"
             placeholder="e.g. 0001" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" name="password" type="password"
             autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary">Log In</button>
  </form>
</div>
{% endblock %}
